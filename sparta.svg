<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="spa_bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#b71c1c"/>
      <stop offset="100%" style="stop-color:#c62828"/>
    </linearGradient>
    <linearGradient id="spa_white" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#eeeeee"/>
    </linearGradient>
    <filter id="spa_shadow">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Shield outer -->
  <path d="M100 6 L180 40 L180 116 Q178 163 100 193 Q22 163 20 116 L20 40 Z"
        fill="url(#spa_white)" filter="url(#spa_shadow)"/>
  <!-- Shield inner red -->
  <path d="M100 13 L173 45 L173 116 Q171 158 100 186 Q29 158 27 116 L27 45 Z"
        fill="url(#spa_bg)"/>

  <!-- White diagonal cross -->
  <line x1="27" y1="45" x2="173" y2="186" stroke="white" stroke-width="18" opacity="0.15"/>
  <line x1="173" y1="45" x2="27" y2="186" stroke="white" stroke-width="18" opacity="0.15"/>

  <!-- Spartan helmet -->
  <!-- Plume / crest -->
  <path d="M85,20 Q100,14 115,20 L118,38 Q100,30 82,38 Z" fill="white" opacity="0.95"/>
  <!-- Helmet dome -->
  <path d="M68,55 Q68,35 100,33 Q132,35 132,55 L132,80 Q132,95 100,98 Q68,95 68,80 Z"
        fill="white" opacity="0.95"/>
  <!-- Visor slit -->
  <rect x="78" y="62" width="44" height="10" rx="3" fill="url(#spa_bg)"/>
  <!-- Cheek guards -->
  <path d="M68,70 L68,92 Q75,100 84,98 L84,78 Z" fill="white" opacity="0.9"/>
  <path d="M132,70 L132,92 Q125,100 116,98 L116,78 Z" fill="white" opacity="0.9"/>
  <!-- Neck guard -->
  <path d="M80,96 Q100,102 120,96 L122,110 Q100,118 78,110 Z" fill="white" opacity="0.85"/>

  <!-- White name band -->
  <rect x="27" y="128" width="146" height="26" fill="white" opacity="0.95"/>
  <text x="100" y="145" font-family="Arial Black, sans-serif" font-size="11" font-weight="900"
        fill="#b71c1c" text-anchor="middle" letter-spacing="3">SPARTA</text>

  <!-- Bottom -->
  <text x="100" y="168" font-family="Arial Black, sans-serif" font-size="9" font-weight="900"
        fill="white" text-anchor="middle" letter-spacing="3">ROTTERDAM</text>

  <!-- Bottom shield decoration -->
  <line x1="55" y1="174" x2="80" y2="174" stroke="white" stroke-width="1.5" opacity="0.5"/>
  <polygon points="100,174 102,180 100,184 98,180" fill="white" opacity="0.6"/>
  <line x1="120" y1="174" x2="145" y2="174" stroke="white" stroke-width="1.5" opacity="0.5"/>
</svg>
